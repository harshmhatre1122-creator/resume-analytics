<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analyzer Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<h1>Resume Analyzer Pro</h1>
<p>Upload your resume and see analytics dashboard</p>

<div class="upload">
<input type="file" id="resumeUpload" accept=".pdf">
<button onclick="analyzeResume()">Analyze Resume</button>
</div>
</header>


<section id="dashboard" class="dashboard hidden">

<div class="grid">

<div class="card score">
<h3>ATS Score</h3>
<div class="big" id="scoreValue">0</div>
</div>

<div class="card">
<h3>Projects</h3>
<div class="big" id="projectCount">0</div>
</div>

<div class="card">
<h3>Skills</h3>
<div class="big" id="skillCount">0</div>
</div>

<div class="card">
<h3>Experience</h3>
<div class="big" id="experienceYears">0 yrs</div>
</div>

<div class="card wide">
<h3>Detected Skills</h3>
<div id="skillsList" class="skills"></div>
</div>

<div class="card wide">
<h3>Issues Found</h3>
<ul id="issuesList"></ul>
</div>
<div class="card wide">
<h3>Skill Distribution</h3>
<canvas id="skillsChart"></canvas>
</div>

<div class="card wide">
<h3>Experience Timeline</h3>
<canvas id="experienceChart"></canvas>
</div>

<div class="card wide">
<h3>ATS Score Breakdown</h3>
<canvas id="scoreChart"></canvas>
</div>
<div class="card full">

<div class="resume-header">
<h3>Generated Resume</h3>

<button onclick="downloadResume()">Download Resume</button>
</div>

<div id="resumePreview"></div>

</div>

</div>

</section>


<div id="loading" class="loading hidden">
<div class="loader"></div>
<p>Analyzing Resume...</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
